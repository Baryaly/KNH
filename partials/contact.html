<section class="section contact" id="contact">
  <div class="container">
    <h2>Get in Touch</h2>
    <p>Reach out to schedule an appointment, ask a question, or learn more about our services.</p>
    <div class="contact-grid">
      <div class="contact-info">
        <p><strong>Address:</strong> 123 Health Street, Your City</p>
        <p><strong>Phone:</strong> (123) 456-7890</p>
        <p><strong>Email:</strong> info@hospitalname.example</p>
        <p><strong>Hours:</strong> Mon–Fri 8am–8pm, Sat–Sun 9am–5pm</p>
      </div>
      <form class="contact-form" aria-label="Contact form">
        <label>
          Name
          <input type="text" name="name" required />
        </label>
        <label>
          Email
          <input type="email" name="email" required />
        </label>
        <label>
          Message
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </div>
</section>
